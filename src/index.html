<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Sort</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <script>
        const checkIsPC = () => {
            const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            // Alternatively, use window width to toggle PC mode for better responsive testing
            const isWideScreen = window.innerWidth > 768 && window.innerWidth > window.innerHeight;
            
            if (!isMobileUA && isWideScreen) {
                document.body.classList.add('is-pc');
            } else {
                document.body.classList.remove('is-pc');
            }
            
            // Trigger a resize event to ensure ThreeJS updates its canvas size properly after layout change
            setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
        };
        
        checkIsPC();
        window.addEventListener('resize', checkIsPC);
    </script>
    <div class="game-ui">
        <div class="top-bar">
            <h1>LEVEL 1</h1>
        </div>
               
        <div class="slider-container">
            <div class="slider-track" id="zoom-slider">
                <div class="slider-track-inner">
                    <div class="slider-top">
                        <span class="slider-icon">+</span>
                    </div>
                    <div class="slider-bottom">
                        <span class="slider-icon">-</span>
                    </div>
                </div>
                <div class="slider-thumb"></div>
            </div>
        </div>
    </div>
    <canvas class="webgl"></canvas>
    <script type="module" src="./script.js"></script>
</body>
</html>
